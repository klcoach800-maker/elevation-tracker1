<script>
/* ================= CONFIG ================= */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbws9NHPCYSzzIO7pVaxgeMwH_RimiDecIgJfYnJlM7UoYCNn9DPKjZV6IWDr1xRm3fK/exec';

/* ================= CONSTANTS ================= */
const GROUPS = [
  {key:'Altitude', label:'Altitude', color:'#C1440E', class:'altitude'},
  {key:'SeaLevel', label:'Sea-Level', color:'#1B6FA8', class:'sealevel'},
  {key:'Control', label:'Control', color:'#6B6B6B', class:'control'},
];

const VARIABLES = [
  {key:'hrr', label:'Heart Rate Recovery', unit:'bpm drop', cat:'Physiological'},
  {key:'vc', label:'Vital Capacity', unit:'L', cat:'Physiological'},
  {key:'rhr', label:'Resting Heart Rate', unit:'bpm', cat:'Physiological'},
  {key:'vo2', label:'VO2 Max (Cooper)', unit:'ml/kg/min', cat:'Physiological'},
  {key:'speed', label:'Speed — 30m Sprint', unit:'sec', cat:'Physiological'},
  {key:'agility', label:'Agility — Illinois', unit:'sec', cat:'Physiological'},
  {key:'power', label:'Explosive Power — Vertical Jump', unit:'cm', cat:'Physiological'},
  {key:'anpower', label:'Anaerobic Power — Margaria-Kalamen', unit:'W', cat:'Physiological'},
  {key:'flex', label:'Flexibility — Sit & Reach', unit:'cm', cat:'Physiological'},
  {key:'dribble', label:'Dribbling', unit:'sec', cat:'Skill'},
  {key:'passing', label:'Passing', unit:'pts /12', cat:'Skill'},
  {key:'shooting', label:'Shooting', unit:'pts /16', cat:'Skill'},
];

const MAX_SUBJECTS = 30;
const STORAGE_KEY = 'elevation-study-data';
const QUEUE_KEY = 'elevation-sync-queue';

/* ================= STATE ================= */
let state = { subjects: [], scores: {} };
let activeTab = 'subjects';
let dataSubjectId = null;
let analysisVar = VARIABLES[0].key;
let analysisMetric = 'gain';
let syncStatus = 'connecting'; // connecting | online | syncing | offline | error
let pendingQueue = []; // actions waiting to reach the Sheet

/* ================= LOCAL CACHE (offline fallback) ================= */
function loadLocalCache(){
  try{
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.subjects = parsed.subjects || [];
      state.scores = parsed.scores || {};
    }
    const q = window.localStorage.getItem(QUEUE_KEY);
    pendingQueue = q ? JSON.parse(q) : [];
  }catch(e){ /* nothing cached yet */ }
}
function saveLocalCache(){
  try{
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    window.localStorage.setItem(QUEUE_KEY, JSON.stringify(pendingQueue));
  }catch(e){ /* storage unavailable, memory-only for this session */ }
}

/* ================= SYNC STATUS UI ================= */
function setSyncStatus(status, label){
  syncStatus = status;
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if(!dot || !lbl) return;
  dot.className = 'sync-dot' + (status==='online'?' online':status==='syncing'?' syncing':status==='error'?' error':'');
  const labels = {
    connecting: 'Connecting to Sheet…',
    online: 'Synced to Google Sheet',
    syncing: 'Saving…',
    offline: `Offline — ${pendingQueue.length} change${pendingQueue.length===1?'':'s'} queued`,
    error: 'Sync error — working offline'
  };
  lbl.textContent = label || labels[status] || '';
}

/* ================= GOOGLE SHEETS SYNC ================= */
async function sheetCall(action, data){
  const url = `${SHEET_URL}?action=${action}${data ? '&data=' + encodeURIComponent(JSON.stringify(data)) : ''}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Sheet request failed: ' + res.status);
  return res.json();
}

async function loadFromSheet(){
  setSyncStatus('connecting');
  try{
    const result = await sheetCall('getAll');
    if(result && result.subjects){
      applySheetData(result);
      setSyncStatus('online');
      return true;
    }
    setSyncStatus('error');
    return false;
  }catch(e){
    setSyncStatus('offline');
    return false;
  }
}

// Sheet rows: Subjects = [id, name, group]; Scores log = [subjectId, varKey, field, value, timestamp]
// We take the LATEST row per (subjectId, varKey, field) as the current value.
function applySheetData(result){
  const subjRows = (result.subjects || []).slice(1); // skip header row if present
  const scoreRows = (result.scores || []).slice(1);

  const subjects = subjRows
    .filter(r => r[0] && r[1] && r[2])
    .map(r => ({ id: String(r[0]), name: String(r[1]), group: String(r[2]) }));

  const scores = {};
  scoreRows.forEach(r=>{
    const [subjectId, varKey, field, value] = r;
    if(!subjectId || !varKey || !field) return;
    const id = String(subjectId);
    if(!scores[id]) scores[id] = {};
    if(!scores[id][varKey]) scores[id][varKey] = {pre:'', post:''};
    scores[id][varKey][field] = value===undefined||value===null ? '' : String(value);
  });

  // Merge: Sheet is source of truth for subjects; keep any local-only subjects too (offline additions)
  const existingIds = new Set(subjects.map(s=>s.id));
  state.subjects.forEach(s=>{ if(!existingIds.has(s.id)) subjects.push(s); });

  state.subjects = subjects.slice(0, MAX_SUBJECTS);
  state.scores = Object.assign({}, scores, pickLocalOnlyScores(scores));
  saveLocalCache();
}

function pickLocalOnlyScores(sheetScores){
  // Keep local values for subjects the sheet doesn't know about yet (queued offline)
  const out = {};
  Object.keys(state.scores).forEach(id=>{
    if(!sheetScores[id]) out[id] = state.scores[id];
  });
  return out;
}

async function pushSubjectToSheet(subject){
  return sheetCall('addSubject', subject);
}
async function pushScoreToSheet(subjectId, varKey, field, value){
  return sheetCall('saveScore', { subjectId, varKey, field, value });
}

/* ================= SYNC QUEUE (so nothing is lost offline) ================= */
function enqueue(action){
  pendingQueue.push(action);
  saveLocalCache();
  setSyncStatus(navigator.onLine ? 'syncing' : 'offline');
  flushQueue();
}

async function flushQueue(){
  if(pendingQueue.length===0){ if(navigator.onLine) setSyncStatus('online'); return; }
  if(!navigator.onLine){ setSyncStatus('offline'); return; }

  setSyncStatus('syncing');
  while(pendingQueue.length>0){
    const action = pendingQueue[0];
    try{
      if(action.type==='addSubject') await pushSubjectToSheet(action.subject);
      else if(action.type==='saveScore') await pushScoreToSheet(action.subjectId, action.varKey, action.field, action.value);
      pendingQueue.shift();
      saveLocalCache();
    }catch(e){
      setSyncStatus('error');
      break;
    }
  }
  if(pendingQueue.length===0) setSyncStatus('online');
}

window.addEventListener('online', ()=>{ flushQueue(); });
window.addEventListener('offline', ()=>{ setSyncStatus('offline'); });

/* ================= TOAST ================= */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove('show'), 1800);
}
function showAutoSaveIndicator(){
  showToast('✓ Saved');
}

/* ================= STATS ================= */
function mean(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }
function sd(arr){
  if(arr.length<2) return 0;
  const m = mean(arr);
  const v = arr.reduce((a,b)=>a+(b-m)*(b-m),0)/(arr.length-1);
  return Math.sqrt(v);
}
function gammaln(x){
  const cof=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
  let y=x, tmp=x+5.5; tmp-=(x+0.5)*Math.log(tmp);
  let ser=1.000000000190015;
  for(let j=0;j<6;j++){ y+=1; ser+=cof[j]/y; }
  return -tmp+Math.log(2.5066282746310005*ser/x);
}
function betacf(a,b,x){
  const MAXIT=100, EPS=3e-7, FPMIN=1e-30;
  let qab=a+b, qap=a+1, qam=a-1;
  let c=1, d=1-qab*x/qap;
  if(Math.abs(d)<FPMIN) d=FPMIN;
  d=1/d; let h=d;
  for(let m=1;m<=MAXIT;m++){
    const m2=2*m;
    let aa=m*(b-m)*x/((qam+m2)*(a+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN;
    c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN;
    d=1/d; h*=d*c;
    aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN;
    c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN;
    d=1/d; const del=d*c; h*=del;
    if(Math.abs(del-1)<EPS) break;
  }
  return h;
}
function betai(a,b,x){
  if(x<=0) return 0;
  if(x>=1) return 1;
  const bt = Math.exp(gammaln(a+b)-gammaln(a)-gammaln(b)+a*Math.log(x)+b*Math.log(1-x));
  if(x < (a+1)/(a+b+2)) return bt*betacf(a,b,x)/a;
  return 1-bt*betacf(b,a,1-x)/b;
}
function tTestPaired(pre, post){
  const n = pre.length;
  if(n<2) return null;
  const diffs = pre.map((p,i)=>post[i]-p);
  const md = mean(diffs), sdd = sd(diffs);
  if(sdd===0) return {t:0, df:n-1, p: md===0?1:0, meanDiff:md, n};
  const t = md/(sdd/Math.sqrt(n));
  const df = n-1;
  const p = betai(df/2, 0.5, df/(df+t*t));
  return {t, df, p, meanDiff:md, n};
}
function oneWayAnova(groupArrays){
  const groups = groupArrays.filter(g=>g.length>0);
  const k = groups.length;
  const N = groups.reduce((a,g)=>a+g.length,0);
  if(k<2 || N<=k) return null;
  const grandMean = mean(groups.flat());
  let ssb=0, ssw=0;
  groups.forEach(g=>{
    const m = mean(g);
    ssb += g.length*(m-grandMean)*(m-grandMean);
    g.forEach(x=> ssw += (x-m)*(x-m));
  });
  const dfb = k-1, dfw = N-k;
  if(dfw<=0) return null;
  const msb = ssb/dfb, msw = ssw/dfw;
  if(msw===0) return {F:0, df1:dfb, df2:dfw, p:1, msw, groups};
  const F = msb/msw;
  const p = betai(dfw/2, dfb/2, dfw/(dfw+dfb*F));
  return {F, df1:dfb, df2:dfw, p, msw, groups};
}
const Q_TABLE_K3 = [
  [5,4.60],[6,4.34],[7,4.16],[8,4.04],[9,3.95],[10,3.88],[11,3.82],[12,3.77],
  [13,3.73],[14,3.70],[15,3.67],[16,3.65],[17,3.63],[18,3.61],[19,3.59],[20,3.58],
  [24,3.53],[30,3.49],[40,3.44],[60,3.40],[120,3.36],[100000,3.31]
];
function qCritical(df){
  if(df<=Q_TABLE_K3[0][0]) return Q_TABLE_K3[0][1];
  for(let i=0;i<Q_TABLE_K3.length-1;i++){
    const [d1,q1]=Q_TABLE_K3[i], [d2,q2]=Q_TABLE_K3[i+1];
    if(df>=d1 && df<=d2){
      const frac=(df-d1)/(d2-d1);
      return q1 + frac*(q2-q1);
    }
  }
  return Q_TABLE_K3[Q_TABLE_K3.length-1][1];
}
function tukeyHSD(groupsWithLabels, msw, dfw){
  const q = qCritical(dfw);
  const results = [];
  for(let i=0;i<groupsWithLabels.length;i++){
    for(let j=i+1;j<groupsWithLabels.length;j++){
      const A = groupsWithLabels[i], B = groupsWithLabels[j];
      if(A.values.length===0 || B.values.length===0) continue;
      const nA=A.values.length, nB=B.values.length;
      const nHarm = 2/(1/nA + 1/nB);
      const diff = Math.abs(mean(A.values)-mean(B.values));
      const hsd = q*Math.sqrt(msw/nHarm);
      results.push({pair:`${A.label} – ${B.label}`, diff, hsd, sig: diff>hsd});
    }
  }
  return {q, results};
}

/* ================= DATA HELPERS ================= */
function getGroupInfo(key){ return GROUPS.find(g=>g.key===key); }
function subjectsInGroup(gkey){ return state.subjects.filter(s=>s.group===gkey); }
function getScore(subjId, varKey){
  return (state.scores[subjId] && state.scores[subjId][varKey]) || {pre:'', post:''};
}
function setScoreLocal(subjId, varKey, field, value){
  if(!state.scores[subjId]) state.scores[subjId] = {};
  if(!state.scores[subjId][varKey]) state.scores[subjId][varKey] = {pre:'', post:''};
  state.scores[subjId][varKey][field] = value;
}
function pairedArraysForVar(subjectIds, varKey){
  const pre=[], post=[];
  subjectIds.forEach(id=>{
    const s = getScore(id, varKey);
    if(s.pre!=='' && s.post!=='' && !isNaN(parseFloat(s.pre)) && !isNaN(parseFloat(s.post))){
      pre.push(parseFloat(s.pre)); post.push(parseFloat(s.post));
    }
  });
  return {pre, post};
}

function renderAnalysis(){
  const enoughData = state.subjects.length>=2;
  if(!enoughData){
    return `<div class="card"><div class="empty"><h3>Not enough data yet</h3><div class="note">Add subjects and log pre/post scores for at least a couple of them to run analysis.</div></div></div>`;
  }
  const v = VARIABLES.find(vv=>vv.key===analysisVar);

  const groupData = GROUPS.map(g=>{
    const ids = subjectsInGroup(g.key).map(s=>s.id);
    const {pre, post} = pairedArraysForVar(ids, v.key);
    const paired = tTestPaired(pre, post);
    const gains = pre.map((p,i)=>post[i]-p);
    return {group:g, pre, post, gains, paired};
  });

  const descRows = groupData.map(gd=>{
    const n = gd.pre.length;
    if(n===0) return `<tr><td>${gd.group.label}</td><td class="num" colspan="5">no paired data</td></tr>`;
    return `<tr>
      <td><span class="pill ${gd.group.class}">${gd.group.label}</span></td>
      <td class="num">${n}</td>
      <td class="num">${mean(gd.pre).toFixed(2)} ± ${sd(gd.pre).toFixed(2)}</td>
      <td class="num">${mean(gd.post).toFixed(2)} ± ${sd(gd.post).toFixed(2)}</td>
      <td class="num">${mean(gd.gains).toFixed(2)}</td>
    </tr>`;
  }).join('');

  const pairedRows = groupData.map(gd=>{
    if(!gd.paired) return `<tr><td>${gd.group.label}</td><td class="num" colspan="4">n/a (need ≥2 paired)</td></tr>`;
    const p = gd.paired;
    return `<tr>
      <td><span class="pill ${gd.group.class}">${gd.group.label}</span></td>
      <td class="num">${p.t.toFixed(3)}</td>
      <td class="num">${p.df}</td>
      <td class="num">${p.p<0.001?'<0.001':p.p.toFixed(3)}</td>
      <td class="num ${p.p<0.05?'sig-yes':'sig-no'}">${p.p<0.05?'Sig.':'n.s.'}</td>
    </tr>`;
  }).join('');

  const metricArrays = groupData.map(gd => analysisMetric==='gain' ? gd.gains : gd.post);
  const anova = oneWayAnova(metricArrays);
  let anovaHtml = `<div class="muted">Not enough complete data across groups to run ANOVA for this variable.</div>`;
  let tukeyHtml = '';
  if(anova){
    anovaHtml = `
    <table>
      <tr><th>F</th><th class="num">df</th><th class="num">p</th><th class="num">Result</th></tr>
      <tr>
        <td class="num">${anova.F.toFixed(3)}</td>
        <td class="num">${anova.df1}, ${anova.df2}</td>
        <td class="num">${anova.p<0.001?'<0.001':anova.p.toFixed(3)}</td>
        <td class="num ${anova.p<0.05?'sig-yes':'sig-no'}">${anova.p<0.05?'Sig.':'n.s.'}</td>
      </tr>
    </table>`;
    const labeled = GROUPS.map((g,i)=>({label:g.label, values: metricArrays[i]}));
    const tukey = tukeyHSD(labeled, anova.msw, anova.df2);
    tukeyHtml = `
    <div class="section-title" style="margin-top:16px;">Tukey HSD Post-hoc (q crit. ${tukey.q.toFixed(2)})</div>
    <table>
      <tr><th>Pair</th><th class="num">Mean Diff</th><th class="num">HSD</th><th class="num">Result</th></tr>
      ${tukey.results.map(r=>`<tr>
        <td>${r.pair}</td>
        <td class="num">${r.diff.toFixed(2)}</td>
        <td class="num">${r.hsd.toFixed(2)}</td>
        <td class="num ${r.sig?'sig-yes':'sig-no'}">${r.sig?'Sig.':'n.s.'}</td>
      </tr>`).join('')}
    </table>`;
  }

  return `
  <div class="card">
    <div class="section-title">Variable</div>
    <select id="varSelect">
      ${VARIABLES.map(vv=>`<option value="${vv.key}" ${vv.key===analysisVar?'selected':''}>${vv.label} (${vv.unit})</option>`).join('')}
    </select>
  </div>

  <div class="card">
    <div class="section-title">Descriptives — ${v.label}</div>
    <table>
      <tr><th>Group</th><th class="num">n</th><th class="num">Pre (M±SD)</th><th class="num">Post (M±SD)</th><th class="num">Mean Gain</th></tr>
      ${descRows}
    </table>
  </div>

  <div class="card">
    <div class="section-title">Paired t-test (within group, pre vs post)</div>
    <table>
      <tr><th>Group</th><th class="num">t</th><th class="num">df</th><th class="num">p</th><th class="num">Result</th></tr>

  <div class="card">
    <div class="section-title">Between-Group Comparison</div>
    <div class="toggle-row">
      <button class="${analysisMetric==='gain'?'':'secondary'}" id="metricGain">Gain (Post − Pre)</button>
      <button class="${analysisMetric==='post'?'':'secondary'}" id="metricPost">Post-test only</button>
    </div>
    <div class="section-title" style="margin-bottom:8px;">One-Way ANOVA (Altitude vs Sea-Level vs Control)</div>
    ${anovaHtml}
    ${tukeyHtml}
    <div class="disclaimer">This is a field-check tool. For thesis submission, confirm all values against SPSS output — p-values here use a standard incomplete-beta t/F approximation and a k=3 studentized-range table for Tukey HSD. Data now lives in your Google Sheet as the source of truth; this device also keeps an offline cache for field use without signal.</div>

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ================= IMPORT ================= */
let pendingImport = null;

function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){
        if(text[i+1]==='"'){ field+='"'; i++; }
        else inQuotes=false;
      } else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n' || c==='\r'){
        if(c==='\r' && text[i+1]==='\n') i++;
        row.push(field); field='';
        if(row.length>1 || row[0]!=='') rows.push(row);
        row=[];
      } else field+=c;
    }
  }
  if(field!=='' || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function splitLooseLine(line){
  if(line.indexOf('\t')>-1) return line.split('\t').map(c=>c.trim());
  if(line.indexOf(',')>-1) return parseCsv(line)[0] || [];
  return line.split(/\s{2,}/).map(c=>c.trim()).filter(c=>c!=='');
}
function rowsFromPlainText(text){
  return text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l!=='').map(splitLooseLine).filter(r=>r.length>1);
}
function groupKeyFromLabel(label){
  const g = GROUPS.find(g=>g.label.toLowerCase()===String(label).trim().toLowerCase() || g.key.toLowerCase()===String(label).trim().toLowerCase());
  return g ? g.key : null;
}
function buildImportFromRows(rows){
  rows = rows.filter(r=>r.some(c=>String(c).trim()!==''));
  if(rows.length<2) throw new Error('Couldn\'t find a data table in that file — it needs a header row plus at least one subject.');
  let headerIdx = rows.findIndex(r => (r[0]||'').trim()==='Subject' && (r[1]||'').trim()==='Group');
  if(headerIdx===-1){
    throw new Error('No "Subject, Group" table found. Expected this app\'s "Download Raw Data" layout.');
  }
  const header = rows[headerIdx].map(h=>String(h).trim());
  const colToVar = {};
  VARIABLES.forEach(v=>{
    const preIdx = header.findIndex(h=>h===`${v.label} Pre`);
    const postIdx = header.findIndex(h=>h===`${v.label} Post`);
    if(preIdx>-1) colToVar[preIdx] = {varKey:v.key, field:'pre'};
    if(postIdx>-1) colToVar[postIdx] = {varKey:v.key, field:'post'};
  });
  if(Object.keys(colToVar).length===0){
    throw new Error('No matching variable columns found in the file header.');
  }
  const subjects = [];
  const scores = {};
  const warnings = [];
  rows.slice(headerIdx+1).forEach((r, idx)=>{
    const lineNo = headerIdx+idx+2;
    const name = (r[0]||'').trim();
    if(!name){ warnings.push(`Row ${lineNo}: missing subject name — skipped.`); return; }
    const groupKey = groupKeyFromLabel(r[1]);
    if(!groupKey){ warnings.push(`Row ${lineNo}: unrecognized group "${r[1]}" for ${name} — skipped.`); return; }
    const id = 's' + Date.now() + Math.floor(Math.random()*100000) + idx;
    subjects.push({id, name, group: groupKey});
    scores[id] = {};
    Object.keys(colToVar).forEach(colIdxStr=>{
      const colIdx = Number(colIdxStr);
      const {varKey, field} = colToVar[colIdx];
      const raw = r[colIdx]===undefined ? '' : String(r[colIdx]).trim();
      if(!scores[id][varKey]) scores[id][varKey] = {pre:'', post:''};
      if(raw===''){ return; }
      if(isNaN(parseFloat(raw))){
        warnings.push(`Row ${lineNo}: non-numeric value "${raw}" for ${name} — left blank.`);
        return;
      }
      scores[id][varKey][field] = raw;
    });
  });
  if(subjects.length===0){ throw new Error('No valid subject rows found in that file.'); }
  if(subjects.length>MAX_SUBJECTS){
    warnings.push(`File contains ${subjects.length} subjects, above the ${MAX_SUBJECTS} roster limit — only the first ${MAX_SUBJECTS} will be kept.`);
  }
  return { subjects: subjects.slice(0, MAX_SUBJECTS), scores, warnings, rowCount: subjects.length };
}
function buildImportFromCsv(text){ return buildImportFromRows(parseCsv(text)); }
function buildImportFromPlainText(text){ return buildImportFromRows(rowsFromPlainText(text)); }
function extractTextFromDocx(file){
  if(typeof mammoth==='undefined'){ return Promise.reject(new Error('Word file support didn\'t load — check your connection and try again.')); }
  return file.arrayBuffer().then(buf=>mammoth.extractRawText({arrayBuffer: buf})).then(res=>res.value);
}
function extractTextFromPdf(file){
  if(typeof pdfjsLib==='undefined'){ return Promise.reject(new Error('PDF support didn\'t load — check your connection and try again.')); }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  return file.arrayBuffer().then(buf=>pdfjsLib.getDocument({data: buf}).promise).then(async pdf=>{
    let text = '';
    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const lines = {};
      content.items.forEach(item=>{
        const y = Math.round(item.transform[5]);
        if(!lines[y]) lines[y] = [];
        lines[y].push(item.str);
      });
      const ys = Object.keys(lines).map(Number).sort((a,b)=>b-a);
      ys.forEach(y=>{ text += lines[y].join('  ') + '\n'; });
      text += '\n';
    }
    return text;
  });
}
function importFromFile(file){
  const name = (file.name||'').toLowerCase();
  const isPdf = name.endsWith('.pdf') || file.type==='application/pdf';
  const isDocx = name.endsWith('.docx') || file.type==='application/vnd.openxmlformats-officedocument.wordprocessingml.document';
  const isCsv = name.endsWith('.csv') || file.type==='text/csv';
  if(isPdf) return extractTextFromPdf(file).then(buildImportFromPlainText);
  if(isDocx) return extractTextFromDocx(file).then(buildImportFromPlainText);
  if(isCsv) return file.text().then(buildImportFromCsv);
  return file.text().then(buildImportFromPlainText);
}
function renderImportPreview(){
  const box = document.getElementById('importPreview');
  if(!box) return;
  if(!pendingImport){ box.innerHTML=''; return; }
  const {subjects, warnings, rowCount} = pendingImport;
  const byGroup = GROUPS.map(g=>`${subjectsCountIn(subjects,g.key)} ${g.label}`).join(' · ');
  box.innerHTML = `
    <div class="note" style="margin-top:12px; padding-top:10px; border-top:1px solid var(--line);">
      <strong style="color:var(--ink);">${rowCount} subject${rowCount===1?'':'s'} found</strong> — ${byGroup}
      ${warnings.length ? `<div style="margin-top:6px; color:var(--bad);">${warnings.slice(0,5).map(w=>escapeHtml(w)).join('<br>')}${warnings.length>5?`<br>…and ${warnings.length-5} more.`:''}</div>` : ''}
    </div>`;
}
function subjectsCountIn(subjects, groupKey){ return subjects.filter(s=>s.group===groupKey).length; }

function applyImport(mode){
  if(!pendingImport) return;
  const {subjects, scores} = pendingImport;

  if(mode==='replace'){
    state.subjects = subjects;
    state.scores = scores;
  } else {
    subjects.forEach(imp=>{
      const existing = state.subjects.find(s=>s.name.toLowerCase()===imp.name.toLowerCase() && s.group===imp.group);
      if(existing){
        state.scores[existing.id] = Object.assign({}, state.scores[existing.id], scores[imp.id]);
      } else if(state.subjects.length<MAX_SUBJECTS){
        state.subjects.push(imp);
        state.scores[imp.id] = scores[imp.id];
      }
    });
  }
  saveLocalCache();

  // Push everything to the Sheet
  state.subjects.forEach(s=> enqueue({type:'addSubject', subject:s}) );
  Object.keys(state.scores).forEach(subjectId=>{
    Object.keys(state.scores[subjectId]).forEach(varKey=>{
      ['pre','post'].forEach(field=>{
        const value = state.scores[subjectId][varKey][field];
        if(value!=='') enqueue({type:'saveScore', subjectId, varKey, field, value});
      });
    });
  });

  pendingImport = null;
  render();
  showToast(mode==='replace' ? 'Data replaced — syncing to Sheet' : 'Data merged — syncing to Sheet');
}

/* ================= EVENTS ================= */
function bindEvents(){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  if(activeTab==='subjects'){
    const addBtn = document.getElementById('addSubjectBtn');
    if(addBtn) addBtn.onclick = ()=>{
      const nameEl = document.getElementById('newName');
      const groupEl = document.getElementById('newGroup');
      const name = nameEl.value.trim();
      if(!name){ showToast('Enter a name first'); return; }
      if(state.subjects.length>=MAX_SUBJECTS){ showToast('Roster is full'); return; }
      const id = 's' + Date.now() + Math.floor(Math.random()*1000);
      const subject = {id, name, group: groupEl.value};
      state.subjects.push(subject);
      saveLocalCache();
      enqueue({type:'addSubject', subject});
      render();
      showToast('Subject added');
    };
    document.querySelectorAll('[data-remove]').forEach(b=>{
      b.onclick = ()=>{
        const id = b.dataset.remove;
        state.subjects = state.subjects.filter(s=>s.id!==id);
        delete state.scores[id];
        if(dataSubjectId===id) dataSubjectId = null;
        saveLocalCache();
        render();
        showToast('Removed on this device. Note: the Sheet keeps a full log — delete the row there too if needed.');
      };
    });
  }

  if(activeTab==='data'){
    const sel = document.getElementById('subjSelect');
    if(sel) sel.onchange = ()=>{ dataSubjectId = sel.value; render(); };
    const saveBtn = document.getElementById('saveScoresBtn');
    if(saveBtn) saveBtn.onclick = ()=>{
      document.querySelectorAll('[data-var]').forEach(inp=>{
        const value = inp.value;
        setScoreLocal(dataSubjectId, inp.dataset.var, inp.dataset.field, value);
        if(value!=='') enqueue({type:'saveScore', subjectId: dataSubjectId, varKey: inp.dataset.var, field: inp.dataset.field, value});
      });
      saveLocalCache();
      showToast('Scores saved');
    };
    let autoSaveTimers = {};
    document.querySelectorAll('[data-var]').forEach(inp=>{
      const key = inp.dataset.var + '_' + inp.dataset.field;
      inp.addEventListener('input', ()=>{
        setScoreLocal(dataSubjectId, inp.dataset.var, inp.dataset.field, inp.value);
        saveLocalCache();
        clearTimeout(autoSaveTimers[key]);
        autoSaveTimers[key] = setTimeout(()=>{
          const value = inp.value;
          if(value!=='') enqueue({type:'saveScore', subjectId: dataSubjectId, varKey: inp.dataset.var, field: inp.dataset.field, value});
          showAutoSaveIndicator();
        }, 700);
      });
      inp.addEventListener('blur', ()=>{
        const value = inp.value;
        setScoreLocal(dataSubjectId, inp.dataset.var, inp.dataset.field, value);
        saveLocalCache();
        if(value!=='') enqueue({type:'saveScore', subjectId: dataSubjectId, varKey: inp.dataset.var, field: inp.dataset.field, value});
      });
    });
  }

  if(activeTab==='analysis'){
    const vsel = document.getElementById('varSelect');
    if(vsel) vsel.onchange = ()=>{ analysisVar = vsel.value; render(); };
    const mg = document.getElementById('metricGain');
    const mp = document.getElementById('metricPost');
    if(mg) mg.onclick = ()=>{ analysisMetric='gain'; render(); };
    if(mp) mp.onclick = ()=>{ analysisMetric='post'; render(); };
  }

  if(activeTab==='export'){
    const er = document.getElementById('exportRaw');
    if(er) er.onclick = downloadRawCsv;
    const es = document.getElementById('exportSummary');
    if(es) es.onclick = downloadSummaryCsv;
    const rep = document.getElementById('exportReport');
    if(rep) rep.onclick = downloadAnalysisReport;
    const rst = document.getElementById('resetAll');
    if(rst) rst.onclick = ()=>{
      if(confirm('This clears the local cache on this device only — your Google Sheet data is untouched. Continue?')){
        state = {subjects:[], scores:{}};
        saveLocalCache();
        loadFromSheet().then(render);
        showToast('Local cache cleared — reloaded from Sheet');
      }
    };
    const resync = document.getElementById('resyncBtn');
    if(resync) resync.onclick = async ()=>{
      showToast('Re-syncing…');
      const ok = await loadFromSheet();
      render();
      showToast(ok ? 'Re-synced from Sheet' : 'Could not reach Sheet — showing cached data');
    };

    const fileInput = document.getElementById('importFile');
    const importBtn = document.getElementById('importBtn');
    const fileNameEl = document.getElementById('importFileName');
    const statusEl = document.getElementById('importStatus');
    const modeRow = document.getElementById('importModeRow');

    if(importBtn) importBtn.onclick = ()=> fileInput && fileInput.click();

    if(fileInput) fileInput.onchange = ()=>{
      const file = fileInput.files && fileInput.files[0];
      pendingImport = null;
      if(modeRow) modeRow.style.display = 'none';
      const box = document.getElementById('importPreview');
      if(box) box.innerHTML = '';
      if(!file){
        if(fileNameEl) fileNameEl.style.display='none';
        if(statusEl) statusEl.style.display='none';
        return;
      }
      if(fileNameEl){ fileNameEl.textContent = file.name; fileNameEl.style.display = 'block'; }
      if(statusEl){ statusEl.textContent = 'Reading file…'; statusEl.style.display = 'block'; }

      importFromFile(file).then(result=>{
        pendingImport = result;
        if(statusEl) statusEl.style.display = 'none';
        if(modeRow) modeRow.style.display = 'flex';
        renderImportPreview();
        showToast('File read — choose how to import');
      }).catch(err=>{
        pendingImport = null;
        if(statusEl) statusEl.style.display = 'none';
        if(modeRow) modeRow.style.display = 'none';
        const box = document.getElementById('importPreview');
        if(box) box.innerHTML = `<div class="note" style="margin-top:12px; color:var(--bad);">${escapeHtml(err.message||'Could not read that file.')}</div>`;
        showToast('Could not read that file');
      });
    };

    const mergeBtn = document.getElementById('importMerge');
    const replaceBtn = document.getElementById('importReplace');
    if(mergeBtn) mergeBtn.onclick = ()=>{
      if(!pendingImport) return;
      applyImport('merge');
      if(fileInput) fileInput.value = '';
      if(fileNameEl) fileNameEl.style.display='none';
    };
    if(replaceBtn) replaceBtn.onclick = ()=>{
      if(!pendingImport) return;
      if(confirm('This replaces every subject and score currently loaded with the contents of the file, and pushes it all to the Sheet. Continue?')){
        applyImport('replace');
        if(fileInput) fileInput.value = '';
        if(fileNameEl) fileNameEl.style.display='none';
      }
    };
  }
}

function triggerDownload(filename, content){
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadRawCsv(){
  const header = ['Subject','Group', ...VARIABLES.flatMap(v=>[`${v.label} Pre`, `${v.label} Post`])];
  const lines = [header.join(',')];
  state.subjects.forEach(s=>{
    const row = [`"${s.name}"`, getGroupInfo(s.group).label];
    VARIABLES.forEach(v=>{
      const sc = getScore(s.id, v.key);
      row.push(sc.pre===''?'':sc.pre, sc.post===''?'':sc.post);
    });
    lines.push(row.join(','));
  });
  triggerDownload('elevation-raw-data.csv', lines.join('\n'));
  showToast('Raw data downloaded');
}

function downloadSummaryCsv(){
  const lines = [['Variable','Group','n','Pre Mean','Pre SD','Post Mean','Post SD','Mean Gain','Paired t','Paired df','Paired p'].join(',')];
  VARIABLES.forEach(v=>{
    GROUPS.forEach(g=>{
      const ids = subjectsInGroup(g.key).map(s=>s.id);
      const {pre, post} = pairedArraysForVar(ids, v.key);
      if(pre.length===0) return;
      const paired = tTestPaired(pre, post);
      const gains = pre.map((p,i)=>post[i]-p);
      lines.push([
        `"${v.label}"`, g.label, pre.length,
        mean(pre).toFixed(3), sd(pre).toFixed(3),
        mean(post).toFixed(3), sd(post).toFixed(3),
        mean(gains).toFixed(3),
        paired?paired.t.toFixed(3):'', paired?paired.df:'', paired?paired.p.toFixed(4):''
      ].join(','));
    });
  });
  triggerDownload('elevation-summary-stats.csv', lines.join('\n'));
  showToast('Summary stats downloaded');
}

function pctChange(preMean, postMean){
  if(preMean===0) return null;
  return ((postMean-preMean)/Math.abs(preMean))*100;
}
function lowerIsBetter(v){ return v.unit==='sec'; }
function describeVariableResult(v, groupData, anova, tukey){
  const lines = [];
  lines.push(`${v.label} (${v.unit})`);
  lines.push('-'.repeat(v.label.length + v.unit.length + 3));
  groupData.forEach(gd=>{
    const g = gd.group;
    if(gd.pre.length===0){
      lines.push(`  ${g.label}: no complete pre/post pairs recorded — skipped.`);
      return;
    }
    const preM = mean(gd.pre), postM = mean(gd.post);
    const gainM = mean(gd.gains);
    const better = lowerIsBetter(v) ? gainM < 0 : gainM > 0;
    const dir = gainM===0 ? 'showed no change' : (better ? 'improved' : 'declined');
    const pct = pctChange(preM, postM);
    const pctStr = pct===null ? '' : ` (${pct>0?'+':''}${pct.toFixed(1)}%)`;
    let sigStr = 'not enough paired data to test significance';
    if(gd.paired){
      const p = gd.paired;
      sigStr = p.p<0.05
        ? `a statistically significant change (t(${p.df})=${p.t.toFixed(2)}, p=${p.p<0.001?'<0.001':p.p.toFixed(3)})`
        : `no statistically significant change (t(${p.df})=${p.t.toFixed(2)}, p=${p.p.toFixed(3)})`;
    }
    lines.push(`  ${g.label} (n=${gd.pre.length}): mean ${preM.toFixed(2)} pre → ${postM.toFixed(2)} post, ${dir}${pctStr}. This is ${sigStr}.`);
  });
  if(anova){
    const sig = anova.p<0.05;
    lines.push(`  Between-group ANOVA: F(${anova.df1},${anova.df2})=${anova.F.toFixed(2)}, p=${anova.p<0.001?'<0.001':anova.p.toFixed(3)} — ${sig?'a significant difference exists between groups':'no significant difference between groups'} on this variable.`);
    if(sig && tukey){
      const sigPairs = tukey.results.filter(r=>r.sig);
      if(sigPairs.length){
        lines.push(`  Tukey HSD flags: ${sigPairs.map(r=>r.pair).join('; ')} differ significantly.`);
      } else {
        lines.push(`  Tukey HSD post-hoc found no individual pair reaching significance despite the overall ANOVA result.`);
      }
    }
  } else {
    lines.push(`  Between-group ANOVA: not enough complete data across all three groups to compare.`);
  }
  lines.push('');
  return lines.join('\n');
}
function buildAnalysisReport(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
  const header = [
    'ELEVATION — ALTITUDE TRAINING STUDY',
    'Analysis Report (auto-generated, describes results in plain language)',
    `Generated: ${dateStr}`,
    `Subjects: ${state.subjects.length} (${GROUPS.map(g=>`${subjectsInGroup(g.key).length} ${g.label}`).join(', ')})`,
    `Data source: Google Sheet (live) with offline device cache`,
    '',
    '='.repeat(60),
    ''
  ].join('\n');
  const sigFindings = [];
  const bodyParts = VARIABLES.map(v=>{
    const groupData = GROUPS.map(g=>{
      const ids = subjectsInGroup(g.key).map(s=>s.id);
      const {pre, post} = pairedArraysForVar(ids, v.key);
      const paired = tTestPaired(pre, post);
      const gains = pre.map((p,i)=>post[i]-p);
      return {group:g, pre, post, gains, paired};
    });
    const metricArrays = groupData.map(gd=>gd.gains);
    const anova = oneWayAnova(metricArrays);
    let tukey = null;
    if(anova){
      const labeled = GROUPS.map((g,i)=>({label:g.label, values: metricArrays[i]}));
      tukey = tukeyHSD(labeled, anova.msw, anova.df2);
    }
    groupData.forEach(gd=>{
      if(gd.paired && gd.paired.p<0.05){
        const better = lowerIsBetter(v) ? mean(gd.gains)<0 : mean(gd.gains)>0;
        sigFindings.push(`${gd.group.label} showed a significant ${better?'improvement':'decline'} in ${v.label} (p=${gd.paired.p<0.001?'<0.001':gd.paired.p.toFixed(3)}).`);
      }
    });
    if(anova && anova.p<0.05){
      sigFindings.push(`Groups differed significantly on ${v.label} (ANOVA p=${anova.p<0.001?'<0.001':anova.p.toFixed(3)}).`);
    }
    return describeVariableResult(v, groupData, anova, tukey);
  });
  const summarySection = [
    'KEY FINDINGS AT A GLANCE',
    '-'.repeat(25),
    sigFindings.length
      ? sigFindings.map(f=>`• ${f}`).join('\n')
      : '• No statistically significant results were found across the variables currently entered.',
    '',
    '='.repeat(60),
    'DETAILED RESULTS BY VARIABLE',
    '='.repeat(60),
    ''
  ].join('\n');
  const footer = [
    '='.repeat(60),
    'NOTES',
    '-'.repeat(60),
    'This report is generated from data synced with your Google Sheet database.',
    'Statistics use a standard incomplete-beta approximation for t/F distributions',
    'and a k=3 studentized-range table for Tukey HSD. For thesis submission, verify',
    'key values against SPSS or another statistical package before citing them.',
    ''
  ].join('\n');
  return header + summarySection + bodyParts.join('\n') + footer;
}
function downloadAnalysisReport(){
  if(state.subjects.length<2){ showToast('Add at least two subjects with scores first'); return; }
  const report = buildAnalysisReport();
  const blob = new Blob([report], {type:'text/plain;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'elevation-analysis-report.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Analysis report downloaded');
}

async function init(){
  loadLocalCache();
  render(); // show cached data immediately, don't block on network
  await loadFromSheet(); // then sync with the Sheet
  render();
  flushQueue();
}
init();
